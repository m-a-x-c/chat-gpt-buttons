<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ChatGPT Shortcut Buttons</title>
  <style>
    :root {
      --bg: #2f2f2f;
      --bg-hover: rgba(255, 255, 255, 0.05);
      --text: #ececec;
      --text-muted: #b4b4b4;
      --border: rgba(255, 255, 255, 0.08);
      --track: #595959;
      --track-on: #10a37f;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 288px;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    .master {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .master-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .master-label {
      font-size: 14px;
      font-weight: 600;
    }
    .master-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin: 2px 0 0;
      line-height: 1.4;
    }
    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin: 0 0 4px;
    }
    .subtitle {
      font-size: 12px;
      line-height: 1.45;
      color: var(--text-muted);
      margin: 0;
    }
    .list {
      padding: 6px;
      transition: opacity 200ms ease;
    }
    .list[data-disabled="true"] {
      opacity: 0.35;
      pointer-events: none;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      transition: background 120ms ease;
    }
    .row:hover { background: var(--bg-hover); }
    .row-label {
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
    }
    .toggle {
      appearance: none;
      -webkit-appearance: none;
      flex-shrink: 0;
      width: 30px;
      height: 18px;
      background: var(--track);
      border-radius: 999px;
      position: relative;
      cursor: pointer;
      transition: background 180ms ease;
      margin: 0;
      outline: none;
    }
    .toggle::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform 180ms ease;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
    }
    .toggle:checked { background: var(--track-on); }
    .toggle:checked::before { transform: translateX(12px); }
    .toggle:focus-visible {
      box-shadow: 0 0 0 2px rgba(16, 163, 127, 0.4);
    }
  </style>
</head>
<body>
  <div class="master">
    <label class="master-row">
      <span>
        <div class="master-label">Enable extension</div>
        <p class="master-sub">Inject shortcut buttons on chatgpt.com.</p>
      </span>
      <input type="checkbox" id="masterToggle" class="toggle" checked>
    </label>
  </div>
  <div class="header">
    <div class="title">Shortcut buttons</div>
    <p class="subtitle">Choose which buttons appear above the ChatGPT composer.</p>
  </div>
  <div class="list" id="list"></div>
  <script src="pills.js"></script>
  <script src="popup.js"></script>
</body>
</html>
